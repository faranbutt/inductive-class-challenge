name: GNN Challenge Auto-Grader

on:
  pull_request_target:
    paths:
      - 'submissions/**/*.enc'

permissions:
  contents: write
  pull-requests: write

jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0 

      # KEEP EVERYTHING BELOW THIS LINE EXACTLY THE SAME
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install pandas scikit-learn rsa

      # 1. FIND THE NEW FILE AND DECRYPT IT
      - name: Decrypt Submission
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          # Use git diff to find the exact .enc file added in this specific PR
          # NEW_FILE=$(git diff --name-only origin/main...HEAD | grep '^submissions/.*\.enc$' | head -n 1)
          # Safest way to diff in GitHub Actions using exact commit SHAs
          NEW_FILE=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | grep '^submissions/.*\.enc$' | head -n 1)
          
          if [ -z "$NEW_FILE" ]; then
            echo "::error::No new .enc file found in this Pull Request!"
            exit 1
          fi
          
          echo "🔍 Found new submission: $NEW_FILE"
          
          # Pass the exact new file to the Python decryptor
          # (Ensure decrypt.py is written to accept a file argument: python decrypt.py <file>)
          python competition/decrypt.py "$NEW_FILE"
          
          # Assuming decrypt.py strips '.enc' to make '.csv'
          DECRYPTED_FILE="${NEW_FILE%.enc}"
          
          # Export the exact file path so next steps can use it
          echo "EVAL_FILE=$DECRYPTED_FILE" >> $GITHUB_ENV

      # 2. VALIDATE SUBMISSION
      - name: Validate Submission
        run: |
          echo "🔍 Validating: ${{ env.EVAL_FILE }}"
          python competition/validate_submission.py "${{ env.EVAL_FILE }}" "data/public/test_nodes.csv" "leaderboard/leaderboard.csv"

      # 3. RESTORE HIDDEN ANSWER KEY
      - name: Restore Secret Answer Key
        env:
          TEST_LABELS: ${{ secrets.TEST_LABELS }}
        run: |
          echo "$TEST_LABELS" | base64 -d | gzip -d > data/test_labels_hidden.csv
          
      # 4. RUN SCORING
      - name: Run Scoring Script
        id: score
        run: |
          echo "🐛 Running evaluation on ${{ env.EVAL_FILE }}..."
          OUTPUT=$(python competition/evaluate.py "${{ env.EVAL_FILE }}" "data/test_labels_hidden.csv")
          SCORE=$(echo "$OUTPUT" | grep -oP 'SCORE=\K[0-9.]+')
          echo "extracted_score=$SCORE" >> $GITHUB_OUTPUT
        

      # 5. POST COMMENT
      - name: Comment on PR
        uses: mshick/add-pr-comment@v2
        with:
          message: |
            ### 🤖 Automated Grading Report
            | Metric | Score | Status |
            | :--- | :--- | :--- |
            | **Macro F1** | **${{ steps.score.outputs.extracted_score }}** | ✅ Valid |
            
            *The leaderboard will be updated if this PR is merged.*
